name: Release Desktop Builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runtime: linux-x64
            artifact_name: dotnet-app-publisher-linux-x64
            artifact_path: artifacts/dotnet-app-publisher-linux-x64.zip
          - os: windows-latest
            runtime: win-x64
            artifact_name: dotnet-app-publisher-win-x64
            artifact_path: artifacts/dotnet-app-publisher-win-x64.zip
          - os: macos-latest
            runtime: osx-x64
            artifact_name: dotnet-app-publisher-osx-x64
            artifact_path: artifacts/dotnet-app-publisher-osx-x64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish desktop app
        run: >
          dotnet publish
          src/DotNetAppPublisher/DotNetAppPublisher.Desktop/DotNetAppPublisher.Desktop.csproj
          --configuration Release
          --runtime ${{ matrix.runtime }}
          --self-contained true
          -p:PublishSingleFile=true
          -o artifacts/${{ matrix.artifact_name }}

      - name: Package macOS app bundle
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "src/DotNetAppPublisher/DotNetAppPublisher.Desktop/bin/Release/DotNetAppPublisher.app" \
            "artifacts/${{ matrix.artifact_name }}.zip"

      - name: Package non-macOS release archive
        if: matrix.os != 'macos-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/${{ matrix.artifact_name }}/* -DestinationPath artifacts/${{ matrix.artifact_name }}.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

      - name: Upload GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_path }}
