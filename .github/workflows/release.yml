name: Release Desktop Builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runtime: linux-x64
            artifact_name: maui-app-publisher-linux-x64
          - os: windows-latest
            runtime: win-x64
            artifact_name: maui-app-publisher-win-x64
          - os: macos-latest
            runtime: osx-x64
            artifact_name: maui-app-publisher-osx-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish desktop app
        run: >
          dotnet publish
          src/MauiAppPublisher/MauiAppPublisher.Desktop/MauiAppPublisher.Desktop.csproj
          --configuration Release
          --runtime ${{ matrix.runtime }}
          --self-contained true
          -p:PublishSingleFile=true
          -o artifacts/${{ matrix.artifact_name }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.artifact_name }}

      - name: Archive release payload
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/${{ matrix.artifact_name }}/* -DestinationPath artifacts/${{ matrix.artifact_name }}.zip

      - name: Upload GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/${{ matrix.artifact_name }}.zip
