name: Feature request
description: Suggest an improvement to .NET App Publisher
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow is painful or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the behavior you would like to see.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Primary platform
      options:
        - Android
        - macOS
        - Windows
        - iOS
        - Cross-platform
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List current workarounds or other ideas if you have them.
